<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <style>
      .brand-blue { fill: #0070f3; }
      .white { fill: #ffffff; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" class="brand-blue" rx="36"/>
  
  <!-- TM Letters -->
  <text x="90" y="105" font-family="Arial, sans-serif" font-size="80" font-weight="bold" class="white" text-anchor="middle" dominant-baseline="middle">
    TM
  </text>
  
  <!-- Briefcase icon for job context -->
  <g transform="translate(90, 45) scale(1.2)">
    <rect x="-15" y="-5" width="30" height="20" fill="none" stroke="#ffffff" stroke-width="2" rx="2"/>
    <path d="M -5 -5 L -5 -12 Q -5 -18 0 -18 Q 5 -18 5 -12 L 5 -5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-8" cy="6" r="1.5" fill="#ffffff"/>
    <circle cx="8" cy="6" r="1.5" fill="#ffffff"/>
  </g>
</svg>
